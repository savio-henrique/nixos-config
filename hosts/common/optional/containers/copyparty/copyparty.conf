# not actually YAML but lets pretend:
# -*- mode: yaml -*-
# vim: ft=yaml:


[global]

  ## Version Checker Advisory
  vc-url: https://api.copyparty.eu/advisories
  vc-age: 3
  vc-exit
  vc-sev: medium
  no-robots

  ## Config
  xff-hdr: cf-connecting-ip
  e2dsa  # enable file indexing and filesystem scanning
  e2ts   # enable multimedia indexing
  ansi   # enable colors in log messages (both in logfiles and stdout)
  qr

  # q, lo: /cfg/log/%Y-%m%d.log   # log to file instead of docker

  # p: 3939          # listen on another port
  # ipa: 10.89.      # only allow connections from 10.89.*
  # df: 16           # stop accepting uploads if less than 16 GB free disk space
  # ver              # show copyparty version in the controlpanel
  # grid             # show thumbnails/grid-view by default
  # theme: 2         # monokai
  # name: datasaver  # change the server-name that's displayed in the browser
  # stats, nos-dup   # enable the prometheus endpoint, but disable the dupes counter (too slow)
  # no-robots, force-js  # make it harder for search engines to read your server
  hist: /cfg/hists/


[accounts]
% /etc/copyparty/users

[groups]
% /etc/copyparty/groups

[/]
  /w
  accs:
    rwmda.: @admin
  flags:
    dedup
    chmod_d: 755
    chmod_f: 644
    gz, xz

[/shared]
  /w/shared
  accs:
    rw: *
    rwmda.: @admin
  flags:
    dthumb            # disable thumbnails
    nodupe            # enable duplicate detection
    dedup             # enable duplicate detection
    sz: 1k-10m        # limit file sizes to 1k-10m
    df: 4g            # stop accepting uploads if less than 4 GB free disk space
    vmaxb: 2g         # limit total upload size to 2 GB
    vmaxn: 1k         # limit total number of files to 1k
    nosub             # disable subfolders
    lifetime: 259200  # limit file lifetime to 3 days
    maxn: 200,3600    # limit max number of files to 200 per hour
    maxb: 1g,1800     # limit max upload size to 1 GB per 30 minutes
    nohtml            # disable HTML rendering of files
    noscript          # disable script execution
    no_sb_md
    no_sb_lg

[/public]
  /w/public
  accs:
    r: *
    rwmda.: @admin


[/private]
  /w/private
  accs:
    rwmda.: @admin
